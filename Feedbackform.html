<html>
<head>
<meta name="veiwport" content="width=device-width, initial scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="loginformstyle.css">
<style>
.body{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:url("imagescar9.jpeg");
  background-size:cover;
  background-position:center;
  
}



.h1{
     font-family: "Lucida-Handwriting",Lucida,cursive;
     color:white;
     font-size:10px;
     text-align:left;
   }
@media screen and (max-width:800px)
{
  .main,.middle,.right{
   width:100%
}
}
</style>
</head>
<body class="body">
<div class="wrapper">
<a href="index.html"> 
<i class="fa-solid fa-house" style="font-size:24px;color:white"></i></a><br><br>
<form action="Feedbackform2.html" >
<div class="input-box">
<label for="fname">First Name:</label>
<input type="fname" name="fname" size="30" maxlength="20" placeholder="Enter First Name"></div><br>
<div class="input-box">
<label for="mname">Middle Name:</label>
<input type="mname" name="mname" size="30" maxlength="20" placeholder="Enter Middle Name"></div><br>
<div class="input-box">
<label for="lname">Last Name:</label>
<input type="lname" name="lname" size="30" maxlength="20" placeholder="Enter Last Name"></div><br>
<div class="input-box">
<label for="gender">Gender:</label>
<input type="radio" name="radio" value="male">Male
<input type="radio" name="radio" value="female">Female
<input type="radio" name="radio" value="other">Other</div>
<div class="input-box">
<label for="phone">Phone no.:</label>
<input type="phone" name="phone" size="30" maxlength="20" placeholder="Enter Phone no."></div><br>
<div class="input-box">
<label for="email">Email:</label>
<input type="email" name="email" size="30" maxlength="20" placeholder="Enter Email id"></div><br>
<div class="input-box">
<label for="feedback">Please Give Feedback:</label>
<input type="feedback" name="feedback" size="30" maxlength="200" placeholder="Feedback"></div><br>
<div class="input-box">
<label for="number">Rate us between 1 to 5:</label>
<input type="number" name="number" size="30" maxlength="5"></div><br>
<div class="input-box">
<input type="submit" value="submit"></div>
</form>
</div>

</body>
</html>
