<html>
<head>
<meta name="veiwport" content="width=device-width, initial scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="loginformstyle2.css">
<style>
.body{
      margin:0;
}

.center{
        
       position:absolute;
        top:0;
        left:0;
        width:10%;
        font-size:30px;
        display:inline-block;
        justify-content:space-evenly;
        align:left;
        
       
}

.state{
        font-size:1rem;
    border:none;
    border-top-right-radius:2px;
 }


.h1{
     font-family: "Lucida-Handwriting",Lucida,cursive;
     color:white;
     font-size:10px;
     text-align:left;
   }
@media screen and (max-width:800px)
{
  .main,.middle,.right{
   width:100%
}
}
</style>
</head>
<body class="body">
<div class="wrapper">

<form action="registerform2.html" >
<a href="index.html"> 
<i class="fa-solid fa-house" style="font-size:24px;color:white"></i></a><br><br>
<div class="input-box">
<label for="fname">First Name:</label>
<input type="fname" name="fname" size="30" maxlength="20" placeholder="Enter First Name"></div><br>
<div class="input-box">
<label for="mname">Middle Name:</label>
<input type="mname" name="mname" size="30" maxlength="20" placeholder="Enter Middle Name"></div><br>
<div class="input-box">
<label for="lname">Last Name:</label>
<input type="lname" name="lname" size="30" maxlength="20" placeholder="Enter Last Name"></div><br>
<div class="input-box">
<label for="gender">Gender:</label>
<input type="radio" name="radio" value="male">Male
<input type="radio" name="radio" value="female">Female
<input type="radio" name="radio" value="other">Other</div><br>
<div class="input-box">
<label for="phone">Phone no.:</label>
<input type="phone" name="phone" size="30" maxlength="20" placeholder="Enter Phone no."></div><br>
<div class="input-box">
<label for="email">Email:</label>
<input type="email" name="email" size="30" maxlength="20" placeholder="Enter Email id"></div><br>
<div class="input-box">
<label for="state">State:</label>
<select class="state">
<option>Andhra Pradesh</option>
<option>Arunachal Pradesh</option>
<option>Assam</option>
<option>Bihar</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Gujarat</option>
<option>Haryana</option>
<option>Himachal Pradesh</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Krela</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Manipur</option>
<option>Meghalaya</option>
<option>Mizoram</option>
<option>Nagaland</option>
<option>Odisha</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Sikkim</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Tripura</option>
<option>Uttarakhand</option>
<option>Uttar Pradesh</option>
<option>West Bengal</option>
<option>Andaman and Nicobar Islands</option>
<option>Chandigarh</option>
<option>Dadra and Nagar Haveli and Daman and Diu</option>
<option>Delhi</option>
<option>Jammu and Kashmir</option>
<option>Ladakh</option>
<option>Lakshadweep</option>
<option>Puducherry</option>
</select></div><br>
<div class="input-box">
<label for="address">Address:</label>
<input type="address" name="address" size="30" maxlength="70" placeholder="Enter Your Address"></div><br>
<div class="input-box">
<input type="submit" value="submit"></div>
</div>
</form>
</body>
</html>
